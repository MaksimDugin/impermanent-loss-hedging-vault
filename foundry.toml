[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
ffi = false
via_ir = true

solc = "D:/solc/solc-windows-amd64-v0.8.28+commit.7893614a.exe"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
sepolia = "${https://sepolia.infura.io/v3/75464e491717487abebf252487157342}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
